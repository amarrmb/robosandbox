name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_publish:
        description: "Build wheel/sdist but skip PyPI upload"
        required: false
        default: "false"

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Extract version from pyproject.toml
        id: version
        run: |
          v=$(python -c "import tomllib; print(tomllib.load(open('packages/robosandbox-core/pyproject.toml','rb'))['project']['version'])")
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Package version: $v"

      - name: Build wheel + sdist
        run: |
          cd packages/robosandbox-core
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: robosandbox-dist-${{ steps.version.outputs.value }}
          path: packages/robosandbox-core/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && inputs.skip_publish != 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/project/robosandbox/
    permissions:
      # Trusted publishing — no API token needed once PyPI is configured
      # to trust this repo's ``pypi`` environment.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: robosandbox-dist-${{ needs.build.outputs.version }}
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
