name: pick_unreachable_cube
prompt: "pick up the red cube"
seed_note: "Example of the replan loop working — cube is placed beyond the Franka's reach envelope (Franka base at x=-0.3, max reach ~0.85m). Pick fails with 'unreachable'; agent replans; fails again; exhausts max_replans."
scene:
  robot_urdf: "@builtin:robots/franka_panda/panda.xml"
  robot_config: "@builtin:robots/franka_panda/panda.robosandbox.yaml"
  objects:
    - id: red_cube
      kind: box
      size: [0.012, 0.012, 0.012]
      pose:
        xyz: [1.2, 0.0, 0.06]        # far past the Franka's ~0.85m reach
      rgba: [0.85, 0.2, 0.2, 1.0]
      mass: 0.05
success:
  kind: lifted
  object: red_cube
  min_mm: 50
