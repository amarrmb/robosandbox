  # cube occasionally slips during long horizontal traverses. The
  # agent's replan loop recovers in many cases; xy_tol is relaxed to
  # a value that's achievable single-shot when the grasp holds. A
  # proper force-controlled gripper lands stack_two reliably.
  kind: moved_above
  object: red_cube
  target: green_cube
  xy_tol: 0.06
  min_dz: 0.008
