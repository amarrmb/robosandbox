  objects:
    - id: red_cube
      kind: box
      size: [0.012, 0.012, 0.012]
      pose:
        xyz: [0.02, 0.0, 0.07]
      rgba: [0.85, 0.2, 0.2, 1.0]
    - id: green_cube
      kind: box
      size: [0.015, 0.015, 0.015]
      pose:
        xyz: [0.08, 0.0, 0.07]
