<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RoboSandbox — Live Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0c0e12; color: #e5e7eb; }
  body { display: grid; grid-template-columns: 1fr 360px; grid-template-rows: 48px 1fr 36px; height: 100vh; }
  header { grid-column: 1 / -1; display: flex; align-items: center; padding: 0 16px; background: #111418; border-bottom: 1px solid #1f2329; }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; color: #f3f4f6; }
  header .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 10px; transition: background 0.2s; }
  header .brand-dot.disconnected { background: #ef4444; }
  header .spacer { flex: 1; }
  header .badge { font-size: 11px; color: #9ca3af; padding: 3px 8px; border: 1px solid #2a2f38; border-radius: 4px; margin-left: 8px; }
  main { grid-column: 1; grid-row: 2; display: flex; align-items: center; justify-content: center; background: #06080a; position: relative; overflow: hidden; }
  #frame { max-width: 100%; max-height: 100%; background: #000; image-rendering: auto; display: block; }
  #frame-placeholder { color: #4b5563; font-size: 14px; }
  aside { grid-column: 2; grid-row: 2; background: #0f1217; border-left: 1px solid #1f2329; display: flex; flex-direction: column; padding: 16px; gap: 16px; overflow: hidden; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .group label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; }
  select, input, button, textarea { font: inherit; font-size: 13px; color: #e5e7eb; background: #1a1e25; border: 1px solid #2a2f38; border-radius: 5px; padding: 8px 10px; outline: none; }
  select:focus, input:focus, textarea:focus { border-color: #4b5563; }
  button { background: #3b82f6; border: none; font-weight: 600; cursor: pointer; color: white; }
  button:hover:not(:disabled) { background: #2563eb; }
  button:disabled { background: #374151; cursor: not-allowed; color: #6b7280; }
  button.record { background: #1f2329; color: #d1d5db; border: 1px solid #2a2f38; }
  button.record:hover:not(:disabled) { background: #2a2f38; }
  button.record.recording { background: #dc2626; color: white; border-color: #dc2626; }
  button.record.recording:hover:not(:disabled) { background: #b91c1c; }
  .rec-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: currentColor; margin-right: 6px; vertical-align: middle; }
  button.record.recording .rec-dot { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .primary-row { display: flex; gap: 8px; }
  .primary-row button { flex: 1; }
  #log { flex: 1; overflow-y: auto; background: #0a0c10; border: 1px solid #1f2329; border-radius: 5px; padding: 8px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11.5px; display: flex; flex-direction: column; gap: 4px; }
  .log-line { padding: 2px 0; color: #9ca3af; border-bottom: 1px solid transparent; }
  .log-line.info { color: #93c5fd; }
  .log-line.success { color: #6ee7b7; }
  .log-line.error { color: #fca5a5; }
  .log-line .t { color: #4b5563; margin-right: 6px; }
  footer { grid-column: 1 / -1; grid-row: 3; display: flex; align-items: center; padding: 0 16px; font-size: 11px; color: #6b7280; background: #0a0c10; border-top: 1px solid #1f2329; gap: 12px; }
  footer .muted { opacity: 0.6; }
  .kbd { font-family: ui-monospace, monospace; font-size: 10.5px; padding: 1px 5px; background: #1a1e25; border: 1px solid #2a2f38; border-bottom-width: 2px; border-radius: 3px; color: #d1d5db; }
  /* Trajectory inspector */
  #inspector { display: none; flex-direction: column; gap: 6px; border-top: 1px solid #1f2329; padding-top: 10px; }
  #inspector.active { display: flex; }
  #inspector .row { display: flex; align-items: center; gap: 8px; }
  #inspector input[type=range] { flex: 1; accent-color: #3b82f6; }
  #inspector .frame-label { font-family: ui-monospace, monospace; font-size: 11.5px; color: #9ca3af; min-width: 88px; text-align: right; }
  #inspector button.step { flex: 0 0 auto; padding: 4px 8px; font-size: 12px; background: #1f2329; border: 1px solid #2a2f38; color: #d1d5db; }
  #inspector button.step:hover:not(:disabled) { background: #2a2f38; }
  #inspector-meta { font-family: ui-monospace, monospace; font-size: 11px; color: #9ca3af; background: #0a0c10; border: 1px solid #1f2329; border-radius: 5px; padding: 6px 8px; line-height: 1.5; white-space: pre-wrap; max-height: 110px; overflow-y: auto; }
  #inspector .hint { font-size: 10.5px; color: #6b7280; }
</style>
</head>
<body>
<header>
  <span id="conn" class="brand-dot disconnected" title="disconnected"></span>
  <h1>RoboSandbox</h1>
  <span class="badge">live viewer</span>
  <div class="spacer"></div>
  <span id="status" class="badge">idle</span>
  <span id="dof-badge" class="badge" style="display:none"></span>
</header>

<main>
  <img id="frame" alt="" style="display:none">
  <div id="frame-placeholder">Waiting for first frame&hellip;</div>
</main>

<aside>
  <div class="group">
    <label for="task-select">Task</label>
    <select id="task-select"></select>
  </div>
  <div class="group">
    <label for="prompt">Prompt (override)</label>
    <input id="prompt" type="text" placeholder="(uses task's default)">
  </div>
  <div class="primary-row">
    <button id="run">Run</button>
    <button id="record" class="record" title="Start/stop recording to runs/"><span class="rec-dot"></span><span id="record-label">Record</span></button>
  </div>
  <div class="group">
    <label>
      <input type="checkbox" id="teleop-toggle" style="vertical-align: middle; margin-right: 6px;">
      Teleop <span class="muted" style="color:#6b7280; font-size:11px;">(WASD=xy, QE=z, Space=grip; gamepad sticks drive ee)</span>
    </label>
  </div>
  <div class="group" style="flex:1; min-height:0">
    <label>Events</label>
    <div id="log"></div>
  </div>

  <div id="inspector">
    <label>Inspector</label>
    <div class="row">
      <button id="insp-prev" class="step" title="Previous frame">&#x25C0;</button>
      <input id="insp-slider" type="range" min="0" max="0" value="0" step="1" disabled>
      <button id="insp-next" class="step" title="Next frame">&#x25B6;</button>
    </div>
    <div class="row">
      <span class="frame-label" id="insp-frame-label">frame 0 / 0</span>
      <span class="spacer" style="flex:1"></span>
      <span class="hint">arrows: &plusmn;1, shift: &plusmn;10, dblclick: resume live</span>
    </div>
    <pre id="inspector-meta">(no frame)</pre>
  </div>
</aside>

<footer>
  <span>Tip: press <span class="kbd">Enter</span> in the prompt to run.</span>
  <span class="spacer" style="flex:1"></span>
  <span class="muted" id="fps">0 fps</span>
</footer>

<script>
const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
const ws = new WebSocket(`${wsProto}//${location.host}/ws`);
ws.binaryType = "blob";

const frame = document.getElementById("frame");
const placeholder = document.getElementById("frame-placeholder");
const conn = document.getElementById("conn");
const statusEl = document.getElementById("status");
const dofBadge = document.getElementById("dof-badge");
const log = document.getElementById("log");
const taskSelect = document.getElementById("task-select");
const promptInput = document.getElementById("prompt");
const runBtn = document.getElementById("run");
const recordBtn = document.getElementById("record");
const recordLabel = document.getElementById("record-label");
const fpsEl = document.getElementById("fps");

let isRecording = false;

let lastFrameUrl = null;
let frameCount = 0;
let fpsTimer = setInterval(() => {
  fpsEl.textContent = `${frameCount} fps`;
  frameCount = 0;
}, 1000);

function stamp() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}`;
}

function addLog(text, kind = "info") {
  const line = document.createElement("div");
  line.className = `log-line ${kind}`;
  line.innerHTML = `<span class="t">${stamp()}</span>${text}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

async function loadTasks() {
  try {
    const r = await fetch("/tasks");
    const data = await r.json();
    taskSelect.innerHTML = "";
    for (const t of data.tasks) {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      taskSelect.appendChild(opt);
    }
    if (data.tasks.includes("pick_cube_franka")) taskSelect.value = "pick_cube_franka";
  } catch (e) {
    addLog(`Failed to load tasks: ${e}`, "error");
  }
}

ws.addEventListener("open", () => {
  conn.classList.remove("disconnected");
  conn.title = "connected";
  addLog("Connected to server.", "info");
  // Kick initial task load via the dropdown selection after tasks are fetched
});
ws.addEventListener("close", () => {
  conn.classList.add("disconnected");
  conn.title = "disconnected";
  addLog("Disconnected.", "error");
});
ws.addEventListener("error", () => {
  addLog("WebSocket error.", "error");
});
ws.addEventListener("message", (ev) => {
  if (typeof ev.data === "string") {
    const msg = JSON.parse(ev.data);
    if (msg.type === "event") handleEvent(msg.event);
    return;
  }
  // binary JPEG
  if (lastFrameUrl) URL.revokeObjectURL(lastFrameUrl);
  lastFrameUrl = URL.createObjectURL(ev.data);
  frame.src = lastFrameUrl;
  if (frame.style.display === "none") {
    frame.style.display = "block";
    placeholder.style.display = "none";
  }
  frameCount++;
});

function handleEvent(evt) {
  if (evt.type === "loaded") {
    statusEl.textContent = `loaded: ${evt.task}`;
    dofBadge.style.display = "inline-block";
    dofBadge.textContent = `${evt.n_dof} DOF`;
    promptInput.placeholder = evt.prompt || "(no prompt)";
    addLog(`Loaded task ${evt.task}  (${evt.n_dof} DOF: ${evt.joint_names.join(", ")})`, "info");
    resetInspector();
  } else if (evt.type === "running") {
    statusEl.textContent = "running";
    runBtn.disabled = true;
    runBtn.textContent = "Running…";
    addLog(`Running: "${evt.prompt}"`, "info");
    resetInspector();
  } else if (evt.type === "done") {
    statusEl.textContent = evt.success ? "success" : "failed";
    runBtn.disabled = false;
    runBtn.textContent = "Run";
    const kind = evt.success ? "success" : "error";
    addLog(`Done: ${evt.success ? "success" : "FAIL"} — ${evt.reason || "(no reason)"} ${evt.detail ? "— " + evt.detail : ""}`, kind);
    for (const step of evt.steps) {
      const tag = step.success ? "success" : "error";
      addLog(`  step: ${step.skill}(${JSON.stringify(step.args)}) → ${step.reason}`, tag);
    }
    if (evt.replans) addLog(`  ${evt.replans} replan(s)`, "info");
    if (typeof evt.trajectory_frames === "number" && evt.trajectory_frames > 0) {
      enableInspector(evt.trajectory_frames);
      addLog(`  trajectory: ${evt.trajectory_frames} frames captured — scrub below`, "info");
    }
  } else if (evt.type === "inspect_frame") {
    onInspectFrame(evt);
  } else if (evt.type === "inspect_cleared") {
    // Live resumed — no UI change needed beyond clearing the meta readout hint.
  } else if (evt.type === "recording_started") {
    isRecording = true;
    recordBtn.classList.add("recording");
    recordLabel.textContent = "Stop";
    addLog(`Recording → episode ${evt.episode_id} (${evt.runs_dir})`, "info");
  } else if (evt.type === "recording_stopped") {
    isRecording = false;
    recordBtn.classList.remove("recording");
    recordLabel.textContent = "Record";
    addLog(`Recording stopped — episode ${evt.episode_id} saved under ${evt.runs_dir}`, "success");
  } else if (evt.type === "error") {
    addLog(`Server error: ${evt.message}`, "error");
    runBtn.disabled = false;
    runBtn.textContent = "Run";
  } else {
    addLog(JSON.stringify(evt));
  }
}

taskSelect.addEventListener("change", () => {
  ws.send(JSON.stringify({ action: "load", task: taskSelect.value }));
});

function doRun() {
  const prompt = promptInput.value.trim();
  ws.send(JSON.stringify({ action: "run", prompt: prompt || null }));
}

runBtn.addEventListener("click", doRun);
promptInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !runBtn.disabled) doRun();
});

recordBtn.addEventListener("click", () => {
  ws.send(JSON.stringify({ action: isRecording ? "record_stop" : "record_start" }));
});

// ------ Teleop ------------------------------------------------------------
// Discrete keypress teleop: WASD/QE emit a delta, Space toggles gripper.
// The server rate-limits via its queue; we also rate-limit at the client so
// auto-repeat doesn't flood the socket.
const TELEOP_STEP_XY = 0.015;   // m per key press
const TELEOP_STEP_Z  = 0.015;
const TELEOP_MIN_MS  = 80;      // client-side rate limit

const teleopToggle = document.getElementById("teleop-toggle");
let teleopEnabled = false;
let lastTeleopAt = 0;

teleopToggle.addEventListener("change", () => {
  teleopEnabled = teleopToggle.checked;
  addLog(teleopEnabled ? "Teleop ON — focus the page" : "Teleop off", "info");
});

function sendTeleop(dx, dy, dz, gripper) {
  const now = performance.now();
  if (now - lastTeleopAt < TELEOP_MIN_MS) return;
  lastTeleopAt = now;
  ws.send(JSON.stringify({ action: "teleop", dx, dy, dz, gripper }));
}

window.addEventListener("keydown", (e) => {
  if (!teleopEnabled) return;
  // Ignore if a form control has focus (prompt input).
  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA")) return;
  let handled = true;
  switch (e.key.toLowerCase()) {
    case "w": sendTeleop(+TELEOP_STEP_XY, 0, 0, null); break;
    case "s": sendTeleop(-TELEOP_STEP_XY, 0, 0, null); break;
    case "a": sendTeleop(0, +TELEOP_STEP_XY, 0, null); break;  // +y = "left" from the robot's POV
    case "d": sendTeleop(0, -TELEOP_STEP_XY, 0, null); break;
    case "q": sendTeleop(0, 0, +TELEOP_STEP_Z, null); break;
    case "e": sendTeleop(0, 0, -TELEOP_STEP_Z, null); break;
    case " ": sendTeleop(0, 0, 0, "toggle"); break;
    default: handled = false;
  }
  if (handled) e.preventDefault();
});

// ------ Gamepad teleop ---------------------------------------------------
// Analog sticks produce continuous motion: left stick = ee xy, right
// stick Y = ee z, buttons A (0) toggle gripper. We scale each axis by
// the stick magnitude so a half-pushed stick moves half as fast.
//
// The sendTeleop rate limiter (TELEOP_MIN_MS = 80 ms) caps the WS send
// rate to ~12 Hz regardless of how fast we poll; the server's Cartesian
// plan runs to completion between messages so motion is smooth.
const GAMEPAD_DEADZONE = 0.15;
const GAMEPAD_STEP_XY = 0.020;      // m per poll at full stick deflection
const GAMEPAD_STEP_Z  = 0.020;
let gamepadPollAnim = null;
let lastGripperBtnDown = false;

function applyDeadzone(v) {
  if (Math.abs(v) < GAMEPAD_DEADZONE) return 0.0;
  // Rescale magnitude back up so just-past-deadzone isn't a dead spot.
  const sign = v < 0 ? -1 : 1;
  return sign * (Math.abs(v) - GAMEPAD_DEADZONE) / (1.0 - GAMEPAD_DEADZONE);
}

function pollGamepad() {
  if (!teleopEnabled) { gamepadPollAnim = null; return; }
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = Array.from(pads).find(p => p && p.connected);
  if (gp) {
    // Standard gamepad axes: 0=LX, 1=LY, 2=RX, 3=RY. Y is inverted on most.
    const lx = applyDeadzone(gp.axes[0] ?? 0);
    const ly = applyDeadzone(gp.axes[1] ?? 0);
    const ry = applyDeadzone(gp.axes[3] ?? 0);
    // ee +x is "forward" (away from robot base), gamepad forward is LY<0.
    // Map LY → dx (invert), LX → dy (invert so right stick = right from operator pov).
    const dx = -ly * GAMEPAD_STEP_XY;
    const dy = -lx * GAMEPAD_STEP_XY;
    const dz = -ry * GAMEPAD_STEP_Z;

    let gripper = null;
    const btn = gp.buttons[0];
    const btnDown = !!(btn && btn.pressed);
    if (btnDown && !lastGripperBtnDown) gripper = "toggle";  // edge-triggered
    lastGripperBtnDown = btnDown;

    if (dx || dy || dz || gripper) {
      sendTeleop(dx, dy, dz, gripper);
    }
  }
  gamepadPollAnim = requestAnimationFrame(pollGamepad);
}

function ensureGamepadPolling() {
  if (!gamepadPollAnim) gamepadPollAnim = requestAnimationFrame(pollGamepad);
}

// Kick off the poll loop whenever teleop turns on; stop when off. We also
// start it opportunistically on first gamepad connection so users don't
// have to re-toggle after plugging in.
const origToggle = teleopToggle;
origToggle.addEventListener("change", () => {
  if (teleopEnabled) ensureGamepadPolling();
});
window.addEventListener("gamepadconnected", (e) => {
  addLog(`Gamepad connected: ${e.gamepad.id} — stick drives ee xy/z, A button toggles gripper`, "info");
  if (teleopEnabled) ensureGamepadPolling();
});
window.addEventListener("gamepaddisconnected", () => {
  addLog("Gamepad disconnected.", "info");
});

// ------ Trajectory inspector ----------------------------------------------
const inspector = document.getElementById("inspector");
const inspSlider = document.getElementById("insp-slider");
const inspPrev = document.getElementById("insp-prev");
const inspNext = document.getElementById("insp-next");
const inspLabel = document.getElementById("insp-frame-label");
const inspMeta = document.getElementById("inspector-meta");

let inspectorTotal = 0;
let inspectorActive = false;  // user is currently scrubbing a past frame

function enableInspector(total) {
  inspectorTotal = total;
  inspector.classList.add("active");
  inspSlider.disabled = false;
  inspSlider.max = String(total - 1);
  inspSlider.value = String(total - 1);
  inspLabel.textContent = `frame ${total} / ${total}`;
  inspMeta.textContent = "(drag slider to scrub)";
}

function resetInspector() {
  // Clear the slider between episodes so stale frame counts never confuse.
  inspectorTotal = 0;
  inspectorActive = false;
  inspector.classList.remove("active");
  inspSlider.disabled = true;
  inspSlider.max = "0";
  inspSlider.value = "0";
  inspLabel.textContent = "frame 0 / 0";
  inspMeta.textContent = "(no frame)";
}

function sendInspectAt(idx) {
  if (inspectorTotal === 0) return;
  const clamped = Math.max(0, Math.min(idx, inspectorTotal - 1));
  inspSlider.value = String(clamped);
  inspectorActive = true;
  ws.send(JSON.stringify({ action: "inspect_at", frame_idx: clamped }));
}

function sendInspectClear() {
  if (!inspectorActive) return;
  inspectorActive = false;
  ws.send(JSON.stringify({ action: "inspect_clear" }));
  inspMeta.textContent = "(live)";
}

function fmtVec(v, digits = 3) {
  return "[" + v.map((x) => x.toFixed(digits)).join(", ") + "]";
}

function onInspectFrame(evt) {
  inspectorTotal = evt.total;
  inspSlider.max = String(evt.total - 1);
  inspSlider.value = String(evt.frame_idx);
  inspLabel.textContent = `frame ${evt.frame_idx + 1} / ${evt.total}`;
  const lines = [];
  lines.push(`t = ${evt.timestamp.toFixed(3)} s`);
  lines.push(`joints = ${fmtVec(evt.robot_joints)}`);
  lines.push(`ee.xyz = ${fmtVec(evt.ee_pose.xyz)}`);
  lines.push(`ee.quat = ${fmtVec(evt.ee_pose.quat_xyzw, 4)}`);
  lines.push(`gripper = ${evt.gripper_width.toFixed(4)}`);
  const objs = Object.keys(evt.scene_objects);
  if (objs.length) {
    for (const k of objs) {
      lines.push(`${k}.xyz = ${fmtVec(evt.scene_objects[k].xyz)}`);
    }
  }
  inspMeta.textContent = lines.join("\n");
}

inspSlider.addEventListener("input", () => {
  sendInspectAt(parseInt(inspSlider.value, 10));
});
inspSlider.addEventListener("dblclick", sendInspectClear);
inspPrev.addEventListener("click", () => {
  sendInspectAt(parseInt(inspSlider.value, 10) - 1);
});
inspNext.addEventListener("click", () => {
  sendInspectAt(parseInt(inspSlider.value, 10) + 1);
});
inspSlider.addEventListener("keydown", (e) => {
  if (inspectorTotal === 0) return;
  const step = e.shiftKey ? 10 : 1;
  if (e.key === "ArrowLeft" || e.key === "ArrowDown") {
    sendInspectAt(parseInt(inspSlider.value, 10) - step);
    e.preventDefault();
  } else if (e.key === "ArrowRight" || e.key === "ArrowUp") {
    sendInspectAt(parseInt(inspSlider.value, 10) + step);
    e.preventDefault();
  }
});

loadTasks().then(() => {
  // If the server preloaded a task, great. Otherwise ask it to load the selected one.
  // Let server-side preload settle first — dispatch explicit load after ~300ms.
  setTimeout(() => {
    if (taskSelect.value) ws.send(JSON.stringify({ action: "load", task: taskSelect.value }));
  }, 300);
});
</script>
</body>
</html>
