[project]
name = "robosandbox"
version = "0.1.0"
description = "Sim-first agentic manipulation sandbox: any arm, any object, any command."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "RoboSandbox contributors" }]
keywords = [
    "robotics", "manipulation", "simulation", "mujoco", "franka",
    "llm", "vlm", "agent", "lerobot", "benchmark",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    # v0.1 is Linux-first: developed + CI-tested on Ubuntu only. Re-add
    # the MacOS classifier when CI covers it.
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Physics",
]

dependencies = [
    "mujoco>=3.2",
    "numpy>=1.24",
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "openai>=1.40",
    "imageio[ffmpeg]>=2.34",
    "trimesh>=4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.4", "mypy>=1.10"]
viewer = ["fastapi>=0.110", "uvicorn[standard]>=0.29"]
meshes = ["coacd>=1.0"]
lerobot = ["pyarrow>=15"]
docs = ["mkdocs>=1.6", "mkdocs-material>=9.5"]

[project.urls]
Homepage = "https://github.com/amarrmb/robosandbox"
Repository = "https://github.com/amarrmb/robosandbox"
Issues = "https://github.com/amarrmb/robosandbox/issues"

[project.scripts]
robo-sandbox = "robosandbox.cli:main"
robo-sandbox-bench = "robosandbox.tasks.runner:main"

[project.entry-points."robosandbox.sim"]
mujoco = "robosandbox.sim.mujoco_backend:MuJoCoBackend"

[project.entry-points."robosandbox.perception"]
ground_truth = "robosandbox.perception.ground_truth:GroundTruthPerception"
vlm_pointer = "robosandbox.perception.vlm_pointer:VLMPointer"

[project.entry-points."robosandbox.grasp"]
analytic_topdown = "robosandbox.grasp.analytic:AnalyticTopDown"

[project.entry-points."robosandbox.motion"]
dls = "robosandbox.motion.ik:DLSMotionPlanner"

[project.entry-points."robosandbox.recorder"]
local_mcap = "robosandbox.recorder.local:LocalRecorder"

[project.entry-points."robosandbox.skills"]
pick = "robosandbox.skills.pick:Pick"
place_on = "robosandbox.skills.place:PlaceOn"
push = "robosandbox.skills.push:Push"
home = "robosandbox.skills.home:Home"
pour = "robosandbox.skills.pour:Pour"
tap = "robosandbox.skills.tap:Tap"
open_drawer = "robosandbox.skills.drawer:OpenDrawer"
close_drawer = "robosandbox.skills.drawer:CloseDrawer"
stack = "robosandbox.skills.stack:Stack"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/robosandbox"]

[tool.hatch.build.targets.sdist]
# Include the in-tree examples + tests + docs specs in the sdist but
# NOT the top-level dev artifacts (runs/, MUJOCO_LOG.TXT). Wheel uses
# the default (just src/robosandbox/).
include = [
    "src/robosandbox/**",
    "tests/**",
    "README.md",
]
