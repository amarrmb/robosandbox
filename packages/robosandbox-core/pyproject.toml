[project]
name = "robosandbox"
version = "0.1.0"
description = "Sim-first agentic manipulation sandbox: any arm, any object, any command."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "RoboSandbox contributors" }]
dependencies = [
    "mujoco>=3.2",
    "numpy>=1.24",
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "openai>=1.40",
    "imageio[ffmpeg]>=2.34",
    "trimesh>=4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.4", "mypy>=1.10"]
viewer = ["fastapi>=0.110", "uvicorn[standard]>=0.29"]
meshes = ["coacd>=1.0"]

[project.scripts]
robo-sandbox = "robosandbox.cli:main"
robo-sandbox-bench = "robosandbox.tasks.runner:main"

[project.entry-points."robosandbox.sim"]
mujoco = "robosandbox.sim.mujoco_backend:MuJoCoBackend"

[project.entry-points."robosandbox.perception"]
ground_truth = "robosandbox.perception.ground_truth:GroundTruthPerception"
vlm_pointer = "robosandbox.perception.vlm_pointer:VLMPointer"

[project.entry-points."robosandbox.grasp"]
analytic_topdown = "robosandbox.grasp.analytic:AnalyticTopDown"

[project.entry-points."robosandbox.motion"]
dls = "robosandbox.motion.ik:DLSMotionPlanner"

[project.entry-points."robosandbox.recorder"]
local_mcap = "robosandbox.recorder.local:LocalRecorder"

[project.entry-points."robosandbox.skills"]
pick = "robosandbox.skills.pick:Pick"
place_on = "robosandbox.skills.place:PlaceOn"
push = "robosandbox.skills.push:Push"
home = "robosandbox.skills.home:Home"
pour = "robosandbox.skills.pour:Pour"
tap = "robosandbox.skills.tap:Tap"
open_drawer = "robosandbox.skills.drawer:OpenDrawer"
close_drawer = "robosandbox.skills.drawer:CloseDrawer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/robosandbox"]

[tool.hatch.build.targets.wheel.force-include]
"assets" = "robosandbox/assets"
